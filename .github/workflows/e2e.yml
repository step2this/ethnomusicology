name: E2E Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      # --- Toolchains ---
      - uses: dtolnay/rust-toolchain@stable
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v5
        with:
          node-version: lts/*

      # --- Rust cache ---
      - uses: actions/cache@v4
        with:
          path: |
            backend/target
            ~/.cargo/registry
            ~/.cargo/git
          key: rust-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: rust-

      # --- Build Next.js frontend ---
      - name: Install frontend deps
        working-directory: frontend-next
        run: bun install --frozen-lockfile

      - name: Build frontend (Next.js)
        working-directory: frontend-next
        run: bun --bun next build

      # --- Build backend ---
      - name: Build backend
        working-directory: backend
        run: cargo build

      # --- Backend quality gates ---
      - name: Backend quality gates
        working-directory: backend
        run: cargo fmt --check && cargo clippy -- -D warnings && cargo test

      # --- Frontend quality gates ---
      - name: Frontend quality gates
        working-directory: frontend-next
        run: bun --bun vitest run

      # --- Playwright setup ---
      - name: Install Playwright deps
        working-directory: e2e
        run: npm ci && npx playwright install --with-deps chromium

      # --- Start backend + run E2E ---
      - name: Start backend
        working-directory: backend
        run: ./target/debug/ethnomusicology-backend &
        env:
          DATABASE_URL: sqlite:e2e-test.db?mode=rwc
          DEV_MODE: "true"
          BIND_ADDRESS: 0.0.0.0

      - name: Wait for backend
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3001/api/health && exit 0
            sleep 1
          done
          exit 1

      - name: Run Playwright tests (backend smoke)
        working-directory: e2e
        run: npx playwright test

      # --- Frontend E2E tests ---
      - name: Install frontend Playwright
        working-directory: frontend-next
        run: bunx playwright install --with-deps chromium

      - name: Run frontend e2e tests
        working-directory: frontend-next
        run: bunx playwright test

      # --- Upload results on failure ---
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: |
            e2e/playwright-report/
            frontend-next/playwright-report/
          retention-days: 7
