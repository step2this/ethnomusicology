name: E2E Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      # --- Toolchains ---
      - uses: dtolnay/rust-toolchain@stable
      - uses: oven-sh/setup-bun@v2

      # --- Rust cache ---
      - uses: actions/cache@v4
        with:
          path: |
            backend/target
            ~/.cargo/registry
            ~/.cargo/git
          key: rust-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: rust-

      # --- Build Next.js frontend ---
      - name: Install frontend deps
        working-directory: frontend-next
        run: bun install --frozen-lockfile

      - name: Build frontend (Next.js)
        working-directory: frontend-next
        run: bun --bun next build

      # --- Build backend ---
      - name: Build backend
        working-directory: backend
        run: cargo build

      # --- Backend quality gates ---
      - name: Backend quality gates
        working-directory: backend
        run: cargo fmt --check && cargo clippy -- -D warnings && cargo test

      # --- Frontend quality gates ---
      - name: Frontend quality gates
        working-directory: frontend-next
        run: bun --bun vitest run

      # --- Frontend E2E tests ---
      - name: Install Playwright
        working-directory: frontend-next
        run: bunx playwright install --with-deps chromium

      - name: Run frontend e2e tests
        working-directory: frontend-next
        run: bunx playwright test

      # --- Upload results on failure ---
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: frontend-next/playwright-report/
          retention-days: 7
