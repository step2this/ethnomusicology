name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      # Rust cache for faster builds
      - uses: actions/cache@v4
        with:
          path: |
            backend/target
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
          key: deploy-rust-${{ hashFiles('backend/Cargo.lock') }}-v2
          restore-keys: deploy-rust-

      - name: Install cargo-lambda
        run: pip3 install cargo-lambda

      - name: Install sqlx-cli
        run: cargo sqlx --version || cargo install sqlx-cli --no-default-features --features postgres,rustls

      - name: Build Lambda binary
        working-directory: backend
        run: cargo lambda build --release

      - name: Run database migrations
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: cargo sqlx migrate run --source migrations

      - name: Deploy to Lambda
        working-directory: backend
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: cargo lambda deploy ethnomusicology-api --binary-name ethnomusicology-backend

  # Vercel deploys automatically via GitHub integration — no action needed.
  # If not using Vercel GitHub integration, uncomment below:
  #
  # deploy-frontend:
  #   runs-on: ubuntu-latest
  #   steps:
